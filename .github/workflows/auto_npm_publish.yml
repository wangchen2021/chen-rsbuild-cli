name: Auto Publish to GitHub Private Registry

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.0

      - name: Install dependencies
        run: |
          npm config set registry https://registry.npmmirror.com/
          pnpm install --frozen-lockfile
          npm config delete registry

      - name: Build
        run: pnpm run build

      - name: Verify build output
        run: |
          echo "验证构建输出..."
          ls -la dist/
          if [ ! -f "dist/index.js" ] && [ ! -f "dist/index.cjs" ] && [ ! -f "dist/index.mjs" ]; then
            echo "❌ 构建失败: dist 目录下无入口文件"
            exit 1
          fi
          echo "✅ 构建验证通过"

      - name: Authenticate to GitHub Packages
        run: |
          # 彻底清理旧配置
          npm config delete always-auth
          rm -f ~/.npmrc ~/.pnpmrc
          
          # 配置 PAT 认证
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "@wangchen2021:registry=https://npm.pkg.github.com" >> ~/.npmrc
          
          # 验证配置和认证
          echo "当前 .npmrc 配置："
          cat ~/.npmrc
          echo "验证认证状态..."
          npm whoami --registry=https://npm.pkg.github.com
          echo "✅ 认证成功"

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN}}
        run: |
          echo "发布版本: $(node -p "require('./package.json').version")"
          pnpm publish \
            --access public \
            --tag latest \
            --registry=https://npm.pkg.github.com \
            --no-git-checks \
            --verbose
          echo "✅ 发布成功"

      - name: Verify publication
        run: |
          sleep 10
          VERSION=$(node -p "require('./package.json').version")
          echo "验证版本 $VERSION 是否发布成功..."
          if npm view @wangchen2021/chen-rsbuild-cli@$VERSION version --registry=https://npm.pkg.github.com; then
            echo "✅ 包发布验证通过"
          else
            echo "⚠️  包同步延迟，建议稍后手动检查"
          fi

      - name: Create release summary
        if: success()
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "## 🎉 发布成功" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 内容 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 包名 | @wangchen2021/chen-rsbuild-cli |" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | $VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| 发布源 | GitHub Packages |" >> $GITHUB_STEP_SUMMARY
